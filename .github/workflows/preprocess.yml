name: Preprocess Telco Dataset

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run automated preprocessing
        run: python preprocessing/automate_Gregorius-Willson.py

      - name: Commit preprocessed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/telco_preprocessing/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update telco_preprocessing from CI"
            git push
          fi
